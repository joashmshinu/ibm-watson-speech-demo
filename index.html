<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBM Watson Speech-to-Text Demo</title>

<style>
body {
    margin: 0;
    font-family: "IBM Plex Sans", Arial, sans-serif;
    background: #0f172a;
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #1e293b;
    padding: 40px;
    border-radius: 12px;
    width: 500px;
    box-shadow: 0 0 30px rgba(0, 119, 255, 0.4);
}

h1 {
    text-align: center;
    color: #0f62fe;
    margin-bottom: 10px;
}

p {
    text-align: center;
    font-size: 14px;
    color: #cbd5e1;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 6px;
    background: #0f62fe;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0353e9;
}

#result {
    margin-top: 20px;
    background: #0f172a;
    padding: 10px;
    border-radius: 6px;
    min-height: 60px;
    font-size: 14px;
}

.footer {
    text-align: center;
    margin-top: 15px;
    font-size: 12px;
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">
    <h1>IBM Watson</h1>
    <p>Speech-to-Text AI Demo</p>

    <button onclick="startRecording()">🎤 Start Recording</button>
    <button onclick="stopRecording()">⏹ Stop & Convert</button>

    <div id="result">Transcribed text will appear here...</div>

    <div class="footer">
        Powered by IBM Watson AI Services
    </div>
</div>

<script>
let mediaRecorder;
let audioChunks = [];

async function startRecording() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.start();
    audioChunks = [];

    mediaRecorder.addEventListener("dataavailable", event => {
        audioChunks.push(event.data);
    });

    document.getElementById("result").innerText = "Recording...";
}

async function stopRecording() {
    mediaRecorder.stop();

    mediaRecorder.addEventListener("stop", async () => {

        const audioBlob = new Blob(audioChunks, { type: "audio/webm" });

        const apiKey = "ndrurTs3uFRXN1DtkolDLarzn7RFFtabWt0PsYgoRpZu";
        const url = "https://api.au-syd.speech-to-text.watson.cloud.ibm.com/instances/efa9242e-fd5c-4fce-b121-79e1a1881b38";

        const response = await fetch(url + "/v1/recognize", {
            method: "POST",
            headers: {
                "Content-Type": "audio/webm",
                "Authorization": "Basic " + btoa("apikey:" + apiKey)
            },
            body: audioBlob
        });

        const data = await response.json();
        const transcript = data.results?.map(r => r.alternatives[0].transcript).join(" ");

        document.getElementById("result").innerText = transcript || "No speech detected.";
    });
}
</script>

</body>
</html>
